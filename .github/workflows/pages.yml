name: Deploy site to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "verse-explorer/**"
      - "kings-timeline/**"
      - "romans-road/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir dist
          cp index.html dist/
          cp -r verse-explorer dist/
          cp -r kings-timeline dist/
          cp -r romans-road dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
